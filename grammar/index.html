<script>
function renderRubyText(text) {
    if (!text) return null;
    var parts = text.split(/(\{[^|]+\|[^}]+\})/g);
    return parts.map(function(part, index) {
        var match = part.match(/^\{([^|]+)\|([^}]+)\}$/);
        if (match) {
            return React.createElement('ruby', {key:index}, match[1], React.createElement('rt', null, match[2]));
        }
        return React.createElement('span', {key:index}, part);
    });
}

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const STORAGE_KEY = 'n1_grammar_mastered_ids';
const CHAPTER_KEY = 'n1_grammar_selected_chapters';
const CH_SIZE = 10;

const ALL_DATA = RAW_GRAMMAR_DATA.map(function(d){ return {id:d[0],zh:d[1],ja:d[2],exJa:d[3],exZh:d[4],conn:d[5]}; });

// 每10条一个单元，最后两个单元合并
var chapters = [];
var mergeFrom = ALL_DATA.length - 15;
for (var i = 0; i < mergeFrom; i += CH_SIZE) {
    var end = i + CH_SIZE;
    chapters.push({name:'第'+(chapters.length+1)+'单元', items: ALL_DATA.slice(i, end)});
}
chapters.push({name:'第'+(chapters.length+1)+'单元', items: ALL_DATA.slice(mergeFrom)});

var chapterNames = chapters.map(function(c){ return c.name; });

var loadMasteredIds = function() {
    try { var d = localStorage.getItem(STORAGE_KEY); return d ? new Set(JSON.parse(d)) : new Set(); } catch(e) { return new Set(); }
};
var saveMasteredIds = function(ids) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(ids))); } catch(e) {} };

var loadSelectedChapters = function() {
    try { var d = localStorage.getItem(CHAPTER_KEY); return d ? JSON.parse(d) : null; } catch(e) { return null; }
};
var saveSelectedChapters = function(chs) { try { localStorage.setItem(CHAPTER_KEY, JSON.stringify(chs)); } catch(e) {} };

function getChapterIdx(id) { return Math.floor((id - 1) / CH_SIZE); }

    var isMobile = window.innerWidth < 640;
    var _savedCh = loadSelectedChapters();
    var _initCh = _savedCh || chapterNames;

    const [sidebarOpen, setSidebarOpen] = useState(!isMobile);

    const [filterMode, setFilterMode] = useState('all');
    const [searchQuery, setSearchQuery] = useState('');
    const [toast, setToast] = useState(null);
    const [searchOpen, setSearchOpen] = useState(false);
    const [shuffleSeed, setShuffleSeed] = useState(0);
    const [flipMode, setFlipMode] = useState(function() {
        try { return localStorage.getItem('n1_grammar_flip_mode') || 'ja_zh'; } catch(e) { return 'ja_zh'; }
    });
    var searchInputRef = useRef(null);

    var showToast = function(msg) { setToast(msg); setTimeout(function(){ setToast(null); }, 2000); };

    var isAllSelected = selectedChapters.length === chapters.length;

    var activeChapters = useMemo(function() {
        if (selectedChapters.length === 0) return [];
        if (selectedChapters.length === chapters.length) return chapterNames;
        return selectedChapters;
    }, [selectedChapters]);

    var toggleChapter = function(ch) {
        setSelectedChapters(function(prev) {
            var next = prev.indexOf(ch) >= 0 ? prev.filter(function(c){ return c !== ch; }) : prev.concat([ch]);
            saveSelectedChapters(next);
            return next;
        });
        setCurrentIndex(0); setIsFlipped(false);
    };

    var toggleAll = function() {
        if (isAllSelected) { setSelectedChapters([]); saveSelectedChapters([]); }
        else { setSelectedChapters(chapterNames.slice()); saveSelectedChapters(chapterNames.slice()); }
        setCurrentIndex(0); setIsFlipped(false);
    };

    var allCards = useMemo(function() {
        var cards = ALL_DATA;
        if (activeChapters.length > 0 && activeChapters.length < chapters.length) {
            cards = cards.filter(function(c) {
                var ch = chapters[getChapterIdx(c.id)];
                return ch && activeChapters.indexOf(ch.name) >= 0;
            });
        }
        return cards;
    }, [activeChapters]);

    var filteredCards = useMemo(function() {
        var cards = allCards;
        if (filterMode === 'learning') {
            cards = cards.filter(function(c){ return !masteredIds.has(c.id); });
        }
        if (searchQuery) {
            var q = searchQuery.toLowerCase();
            cards = cards.filter(function(c){ return c.zh.indexOf(q)>=0 || c.ja.indexOf(q)>=0 || c.exJa.indexOf(q)>=0 || c.conn.indexOf(q)>=0; });
        }
        if (shuffleSeed > 0) {
            cards = cards.slice();
            for (var i = cards.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var tmp = cards[i]; cards[i] = cards[j]; cards[j] = tmp;
            }
        }
        return cards;
    }, [allCards, filterMode, masteredIds, searchQuery, shuffleSeed]);

    var prevFilterKey = useRef('');
    useEffect(function() {
        var key = selectedChapters.slice().sort().join(',') + '|' + filterMode + '|' + searchQuery;
        if (key !== prevFilterKey.current) { setShuffleSeed(0); }
        prevFilterKey.current = key;
    }, [selectedChapters, filterMode, searchQuery]);

    useEffect(function() {
        if (filteredCards.length === 0) { setCurrentIndex(0); return; }
        if (currentIndex >= filteredCards.length) { setCurrentIndex(Math.max(0, filteredCards.length - 1)); setIsFlipped(false); }
    }, [filteredCards.length]);

    var handleFlip = useCallback(function(){ setIsFlipped(function(p){ return !p; }); }, []);

        if (filteredCards.length === 0) return;

            var s = new Set(prev);
            if (s.has(card.id)) s.delete(card.id); else s.add(card.id);
            saveMasteredIds(s);
            return s;

    }, [filteredCards, currentIndex]);

        setShuffleSeed(function(p){ return p+1; }); setCurrentIndex(0); setIsFlipped(false); showToast('已随机打乱 ✓');

    useEffect(function() {

        if (flipMode !== 'random') return flipMode;

        var modes = ['ja_zh', 'zh_ja', 'conn_ex'];
        return modes[Math.abs(card.id) % 3];
    }, [flipMode, filteredCards, currentIndex]);

    var resetProgress = useCallback(function() {
        if (confirm("确定要清空所有已掌握记录吗？")) {
            var empty = new Set(); setMasteredIds(empty); saveMasteredIds(empty);
            setCurrentIndex(0); setIsFlipped(false); showToast('进度已清空');
        }
    }, []);

    var stateRef = useRef({ filteredCards: filteredCards, currentIndex: currentIndex });
    stateRef.current = { filteredCards: filteredCards, currentIndex: currentIndex };

    useEffect(function() {
        var onKey = function(e) {
            var st = stateRef.current;
            if (st.filteredCards.length === 0) return;
            if (e.code === 'Space') { e.preventDefault(); setIsFlipped(function(p){ return !p; }); }
            else if (e.code === 'ArrowLeft') { if (st.currentIndex > 0) { setIsFlipped(false); setTimeout(function(){ setCurrentIndex(function(p){ return p-1; }); }, 150); } }
            else if (e.code === 'ArrowRight') { if (st.currentIndex < st.filteredCards.length - 1) { setIsFlipped(false); setTimeout(function(){ setCurrentIndex(function(p){ return p+1; }); }, 150); } }
            else if (e.code === 'KeyM') toggleMasterStatus();
        };
        window.addEventListener('keydown', onKey);
        return function(){ window.removeEventListener('keydown', onKey); };
    }, [toggleMasterStatus]);

    useEffect(function() {
        var sk = document.getElementById('skeleton');
        if (sk) sk.remove();
    }, []);

    useEffect(function() {
        var t = setTimeout(function() { if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons(); }, 200);
        return function(){ clearTimeout(t); };
    }, [currentIndex, isFlipped, filterMode, filteredCards.length, sidebarOpen]);

    var currentCard = filteredCards.length > 0 ? filteredCards[currentIndex] : null;
    var isCurrentMastered = currentCard ? masteredIds.has(currentCard.id) : false;

    var cardFront = useMemo(function() {
        if (!currentCard) return null;
        var c = currentCard;
        if (actualFlipMode === 'ja_zh') return { label: '日文句型', content: c.ja, hint: '点击查看中文及接续' };
        if (actualFlipMode === 'zh_ja') return { label: '中文含义', content: c.zh, hint: '点击查看日文句型' };
        if (actualFlipMode === 'conn_ex') return { label: '接续规则', content: c.conn, hint: '点击查看例句用法' };
        return { label: 'N1 语法', content: c.ja, hint: '点击查看释义' };
    }, [currentCard, actualFlipMode]);

    var cardBack = useMemo(function() {
        if (!currentCard) return null;
        var c = currentCard;
        if (actualFlipMode === 'ja_zh') return { zh: c.zh, ja: c.ja, conn: c.conn, exJa: c.exJa, exZh: c.exZh };
        if (actualFlipMode === 'zh_ja') return { zh: null, ja: c.ja, conn: c.conn, exJa: c.exJa, exZh: c.exZh, extraTitle: '中文含义', extra: c.zh };
        if (actualFlipMode === 'conn_ex') return { zh: c.zh, ja: c.ja, conn: null, exJa: c.exJa, exZh: c.exZh, extraTitle: '接续规则', extra: c.conn };
        return { zh: c.zh, ja: c.ja, conn: c.conn, exJa: c.exJa, exZh: c.exZh };
    }, [currentCard, actualFlipMode]);

    var masteredInFilter = allCards.filter(function(c){ return masteredIds.has(c.id); }).length;
    var totalInFilter = allCards.length;
    var progressPercent = totalInFilter > 0 ? Math.round((masteredInFilter / totalInFilter) * 100) : 0;

    var chapterStats = useMemo(function() {
        return chapters.map(function(ch) {
            var total = ch.items.length;
            var mastered = ch.items.filter(function(c){ return masteredIds.has(c.id); }).length;
            return { name: ch.name, total: total, mastered: mastered };
        });
    }, [masteredIds]);

    return React.createElement('div', { className: 'flex h-full w-full' },
        toast ? React.createElement('div', { className: 'fixed top-8 left-1/2 -translate-x-1/2 z-50 bg-gray-800 text-white px-4 py-2 rounded-full text-sm shadow-lg fade-in' }, toast) : null,

        sidebarOpen ? React.createElement('div', { className: 'fixed inset-0 bg-black/30 z-30 md:hidden', onClick: function(){ setSidebarOpen(false); } }) : null,

        React.createElement('div', { className: (sidebarOpen ? 'translate-x-0' : '-translate-x-full') + ' md:translate-x-0 md:w-64 fixed md:relative z-40 h-full w-72 bg-white border-r border-gray-200 flex-shrink-0 transition-transform duration-200 flex flex-col' + (!sidebarOpen ? ' md:w-0 md:overflow-hidden' : '') },
            React.createElement('div', { className: 'p-4 border-b border-gray-100' },
                React.createElement('h2', { className: 'text-lg font-bold text-gray-800 flex items-center gap-2' },
                    React.createElement('svg',
                        { xmlns: 'http://www.w3.org/2000/svg', width: '20', height: '20', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2', strokeLinecap: 'round', strokeLinejoin: 'round', className: 'text-indigo-600' },
                        React.createElement('path', { d: 'M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z' }),
                        React.createElement('path', { d: 'M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z' })
                    ),

                React.createElement('p', { className: 'text-xs text-gray-400 mt-1' }, '共 ' + ALL_DATA.length + ' 条 · ' + chapters.length + ' 单元')

            React.createElement('div', { className: 'px-3 py-2 border-b border-gray-100 flex items-center justify-between' },

                        isAllSelected ? React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '10', height: '10', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '3' }, React.createElement('path', { d: 'M20 6L9 17l-5-5' })) : null

                        React.createElement('div', { className: 'flex items-center gap-2' },
                            React.createElement('span', { className: 'inline-flex items-center justify-center w-4 h-4 rounded border flex-shrink-0 ' + (isChecked ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-gray-300 bg-white') },
                                isChecked ? React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '10', height: '10', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '3' }, React.createElement('path', { d: 'M20 6L9 17l-5-5' })) : null
                            ),
                            React.createElement('span', { className: 'truncate' }, cs.name),
                            React.createElement('span', { className: 'text-xs text-gray-400 ml-auto' }, cs.total + '条')
                        ),

                            React.createElement('div', { className: 'bg-green-400 h-1 rounded-full transition-all', style: { width: Math.round(cs.mastered/cs.total*100) + '%' } })
                        ) : null
                    );
                })

                React.createElement('div', { className: 'flex items-center justify-between' },
                    React.createElement('div', { className: 'flex items-center gap-2 min-w-0' },

                            searchOpen ? React.createElement('input', { ref: searchInputRef, type: 'text', value: searchQuery, onChange: function(e){ setSearchQuery(e.target.value); setCurrentIndex(0); setIsFlipped(false); }, placeholder: '搜索语法...', className: 'absolute right-0 top-8 w-44 sm:w-56 px-3 py-1.5 text-sm border border-gray-200 rounded-lg shadow-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300 fade-in z-50' }) : null

                                    React.createElement('path', { d: 'M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z' }),
                                    React.createElement('path', { d: 'M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z' })
                                )
