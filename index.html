<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1备考中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .float { animation: float 3s ease-in-out infinite; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .fade-up { animation: fadeInUp 0.6s ease-out both; }
        .fade-up-delay { animation: fadeInUp 0.6s ease-out 0.15s both; }
        .fade-up-delay2 { animation: fadeInUp 0.6s ease-out 0.3s both; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-8px); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-purple-50 to-indigo-50 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="w-full py-6 px-4">
        <div class="max-w-3xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🎯</span>
                <h1 class="text-xl font-bold text-gray-800">N1备考中心</h1>
            </div>
            <div class="flex items-center gap-2 text-sm text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3.5"></path><path d="M16 2v4"></path><path d="M8 2v4"></path><path d="M3 10h5"></path><path d="M17.5 17.5 16 16.25V14"></path><path d="M22 22a2 2 0 0 1-3-1h-2.5"></path></svg>
                <span>JLPT N1 真题训练</span>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main class="flex-1 flex items-center justify-center px-4 py-8">
        <div class="max-w-3xl w-full">
            <!-- Title -->
            <div class="text-center mb-10 fade-up">
                <div class="inline-block float mb-4">
                    <span class="text-6xl">📚</span>
                </div>
                <h2 class="text-3xl font-bold text-gray-800 mb-2">选择训练内容</h2>
                <p class="text-gray-500">从今天开始，每天进步一点点 ✨</p>
            </div>

            <!-- Cards -->
            <div class="grid md:grid-cols-2 gap-6 fade-up-delay">
                <!-- Grammar Card -->
                <a href="./grammar/" class="card-hover block group">
                    <div class="bg-white rounded-3xl p-8 shadow-sm border border-gray-100 hover:shadow-xl hover:border-indigo-200 relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-bl from-indigo-100 to-transparent rounded-bl-full opacity-60"></div>
                        <div class="relative">
                            <div class="w-14 h-14 bg-indigo-100 rounded-2xl flex items-center justify-center mb-5 group-hover:bg-indigo-200 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-600"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                            </div>
                            <h3 class="text-xl font-bold text-gray-800 mb-2">N1语法特训</h3>
                            <p class="text-sm text-gray-500 mb-4">205条核心语法</p>
                            <div class="space-y-2">
                                <div class="flex items-center gap-2 text-sm text-gray-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-400"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                    <span>中文含义 + 接续规则</span>
                                </div>
                                <div class="flex items-center gap-2 text-sm text-gray-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-400"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                    <span>例句注音 + 翻译</span>
                                </div>
                                <div class="flex items-center gap-2 text-sm text-gray-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-400"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                    <span>翻卡记忆 + 掌握标记</span>
                                </div>
                            </div>
                            <div class="mt-6 flex items-center gap-1 text-indigo-500 font-medium text-sm group-hover:gap-2 transition-all">
                                <span>开始训练</span>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                            </div>
                        </div>
                    </div>
                </a>

                <!-- Vocabulary Card -->
                <a href="./vocab/" class="card-hover block group">
                    <div class="bg-white rounded-3xl p-8 shadow-sm border border-gray-100 hover:shadow-xl hover:border-purple-200 relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-bl from-purple-100 to-transparent rounded-bl-full opacity-60"></div>
                        <div class="relative">
                            <div class="w-14 h-14 bg-purple-100 rounded-2xl flex items-center justify-center mb-5 group-hover:bg-purple-200 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-600"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-7-7 7-7"/></svg>
                            </div>
                            <h3 class="text-xl font-bold text-gray-800 mb-2">N1真题词汇</h3>
                            <p class="text-sm text-gray-500 mb-4">1576词 · 27次真题</p>
                            <div class="space-y-2">
                                <div class="flex items-center gap-2 text-sm text-gray-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-400"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                    <span>按考试年份分类</span>
                                </div>
                                <div class="flex items-center gap-2 text-sm text-gray-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-400"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                    <span>词汇含义 + 例句搭配</span>
                                </div>
                                <div class="flex items-center gap-2 text-sm text-gray-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-400"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                    <span>搜索 + 章节进度</span>
                                </div>
                            </div>
                            <div class="mt-6 flex items-center gap-1 text-purple-500 font-medium text-sm group-hover:gap-2 transition-all">
                                <span>开始训练</span>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                            </div>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Stats -->
            <div class="mt-10 bg-white rounded-2xl p-6 shadow-sm border border-gray-100 fade-up-delay2">
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div>
                        <div class="text-2xl font-bold text-indigo-600">205</div>
                        <div class="text-xs text-gray-400 mt-1">语法条目</div>
                    </div>
                    <div>
                        <div class="text-2xl font-bold text-purple-600">1576</div>
                        <div class="text-xs text-gray-400 mt-1">真题词汇</div>
                    </div>
                    <div>
                        <div class="text-2xl font-bold text-pink-600">27</div>
                        <div class="text-xs text-gray-400 mt-1">真题年份</div>
                    </div>
                </div>
            </div>

            <!-- Quick tips -->
            <div class="mt-6 bg-amber-50 rounded-2xl p-5 border border-amber-100 fade-up-delay2">
                <div class="flex items-start gap-3">
                    <span class="text-xl">💡</span>
                    <div>
                        <h4 class="text-sm font-semibold text-amber-800 mb-1">使用提示</h4>
                        <ul class="text-xs text-amber-700 space-y-1">
                            <li>• 按 <kbd class="px-1.5 py-0.5 bg-amber-100 rounded text-amber-900">←</kbd> <kbd class="px-1.5 py-0.5 bg-amber-100 rounded text-amber-900">→</kbd> 切换卡片</li>
                            <li>• 按 <kbd class="px-1.5 py-0.5 bg-amber-100 rounded text-amber-900">空格</kbd> 翻转卡片</li>
                            <li>• 按 <kbd class="px-1.5 py-0.5 bg-amber-100 rounded text-amber-900">M</kbd> 标记已掌握</li>
                            <li>• 进度自动保存在浏览器中</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-6 text-center text-xs text-gray-300">
        N1备考中心 · 加油！
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
